<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PB Tracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Powerbuilding Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');

  :root {
    --bg:#0a0a0d;--s:#131318;--s2:#1a1a21;--b:#252530;
    --t:#e8e6e3;--d:#6b6b78;--a:#ff6b35;--a2:#ff9f1c;
    --g:#2ec4b6;--bl:#4ea8de;--r:#e63946;--p:#b388ff;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{overscroll-behavior:none;}
  body{
    font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t);
    min-height:100vh;min-height:100dvh;max-width:480px;margin:0 auto;
    -webkit-font-smoothing:antialiased;
  }
  input[type=number]{-moz-appearance:textfield;}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

  /* ── Header ── */
  .header{padding:16px 20px 0;}
  .cycle-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .cycle-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--d);text-transform:uppercase;}
  .cycle-bar .btns{display:flex;gap:6px;}
  .btn-sm{padding:6px 12px;border-radius:8px;border:1px solid var(--b);background:var(--s);color:var(--d);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn-accent{border:none;background:rgba(255,107,53,.15);color:var(--a);font-weight:700;}
  .badge-archive{font-size:10px;font-weight:700;color:var(--p);margin-left:8px;padding:2px 8px;background:rgba(179,136,255,.15);border-radius:10px;}

  .phase-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .phase-title{font-size:22px;font-weight:800;line-height:1.1;}
  .rpe-pill{font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;}

  .week-tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .week-tabs::-webkit-scrollbar{display:none;}
  .week-tab{flex:0 0 auto;padding:7px 13px;border-radius:8px;border:1px solid var(--b);background:var(--s);color:var(--d);font-size:13px;font-weight:400;cursor:pointer;font-family:inherit;}
  .week-tab.active{border:none;background:var(--a);color:#fff;font-weight:700;}

  .day-tabs{display:flex;gap:6px;margin-bottom:14px;}
  .day-tab{flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--b);background:var(--s);color:var(--d);font-size:12px;cursor:pointer;font-family:inherit;text-align:center;}
  .day-tab.active{border:2px solid var(--a);background:rgba(255,107,53,.08);color:var(--t);font-weight:700;}
  .day-tab .label{font-size:14px;font-weight:700;}
  .day-tab .sub{font-size:10px;margin-top:2px;opacity:.7;}

  .progress-bar-wrap{margin-bottom:14px;}
  .progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--d);margin-bottom:5px;}
  .progress-track{height:4px;background:var(--b);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:4px;transition:width .3s;}

  /* ── Exercises ── */
  .exercises{padding:0 20px 140px;}
  .ex-card{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:14px;margin-bottom:10px;transition:opacity .2s,border-color .2s;}
  .ex-card.done{opacity:.5;border-color:rgba(255,107,53,.25);}
  .ex-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
  .ex-info{flex:1;}
  .ex-name-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
  .ex-name{font-size:15px;font-weight:700;}
  .ex-type{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px;}
  .ex-type.main{background:rgba(255,107,53,.15);color:var(--a);}
  .ex-type.sec{background:rgba(78,168,222,.15);color:var(--bl);}
  .ex-type.hyp{background:rgba(255,255,255,.06);color:var(--d);}
  .ex-sets{font-size:13px;color:var(--d);font-weight:300;}
  .ex-backoff{font-size:12px;color:var(--a2);font-weight:400;margin-top:1px;}
  .check-btn{width:30px;height:30px;border-radius:8px;border:2px solid var(--b);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;margin-top:2px;transition:all .15s;}
  .check-btn.checked{border-color:var(--a);background:var(--a);}

  .weight-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
  .weight-label{font-size:10px;color:var(--d);font-weight:600;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
  .weight-wrap{flex:1;position:relative;}
  .weight-input{width:100%;padding:8px 40px 8px 12px;border-radius:8px;border:1px solid var(--b);background:var(--bg);color:var(--t);font-size:15px;font-weight:600;font-family:inherit;outline:none;}
  .weight-input:focus{border-color:var(--a);}
  .weight-unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--d);font-weight:600;}
  .prev-hint{font-size:11px;color:var(--p);margin-top:5px;font-style:italic;}

  /* ── Timer ── */
  .timer-bar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:rgba(19,19,24,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--b);padding:10px 20px;padding-bottom:calc(10px + var(--safe-b));z-index:100;
  }
  .timer-presets{display:flex;gap:6px;align-items:center;}
  .timer-presets .label{font-size:10px;color:var(--d);font-weight:700;margin-right:2px;white-space:nowrap;}
  .timer-preset-btn{flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--b);background:var(--s2);color:var(--t);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .timer-running{display:flex;align-items:center;justify-content:space-between;}
  .timer-display{font-size:32px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
  .timer-target{font-size:13px;color:var(--d);font-weight:400;margin-left:6px;}
  .timer-track{height:3px;width:180px;background:var(--b);border-radius:3px;margin-top:3px;overflow:hidden;}
  .timer-fill{height:100%;border-radius:3px;transition:width 1s linear;}
  .timer-sub{font-size:10px;color:var(--d);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .btn-stop{padding:10px 18px;border-radius:10px;border:none;background:rgba(230,57,70,.2);color:var(--r);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

  /* ── Modal / overlay views ── */
  .view{display:none;padding:20px;min-height:100vh;min-height:100dvh;}
  .view.active{display:block;}
  .view-title{font-size:22px;font-weight:800;margin-bottom:20px;}
  .view-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}

  .summary-card{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:16px;margin-bottom:16px;}
  .summary-label{font-size:12px;font-weight:700;color:var(--d);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
  .summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b);}
  .summary-row:last-child{border-bottom:none;}
  .summary-lift{font-size:14px;}
  .summary-val{font-size:14px;font-weight:700;}
  .est-row{padding:8px 0;border-bottom:1px solid var(--b);}
  .est-row:last-child{border-bottom:none;}
  .est-lift{font-size:14px;font-weight:600;margin-bottom:4px;}
  .est-detail{display:flex;gap:16px;font-size:12px;color:var(--d);}
  .est-detail span span{font-weight:700;}
  .est-note{font-size:11px;color:var(--d);margin-top:10px;line-height:1.5;}

  .btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:var(--a);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;}
  .btn-secondary{width:100%;padding:14px;border-radius:12px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px;}
  .btn-ghost{width:100%;padding:12px;border-radius:12px;border:none;background:transparent;color:var(--d);font-size:13px;cursor:pointer;font-family:inherit;}

  /* History */
  .hist-card{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:16px;margin-bottom:12px;}
  .hist-card.current{border-color:rgba(255,107,53,.3);}
  .hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .hist-title{font-size:16px;font-weight:700;}
  .hist-date{font-size:11px;color:var(--d);}
  .hist-rms{display:flex;gap:8px;margin-bottom:8px;}
  .hist-rm{flex:1;background:var(--bg);border-radius:8px;padding:8px 10px;text-align:center;}
  .hist-rm .lift{font-size:10px;color:var(--d);margin-bottom:2px;}
  .hist-rm .val{font-size:15px;font-weight:700;}
  .hist-meta{font-size:11px;color:var(--d);}
  .btn-consult{margin-top:8px;padding:6px 14px;border-radius:8px;border:1px solid var(--b);background:transparent;color:var(--d);font-size:11px;cursor:pointer;font-family:inherit;}
  .badge-en-cours{font-size:10px;font-weight:700;color:var(--a);margin-left:8px;padding:2px 8px;background:rgba(255,107,53,.15);border-radius:10px;}
</style>
</head>
<body>

<!-- ═══ TRAIN VIEW ═══ -->
<div class="view active" id="v-train">
  <div class="header">
    <div class="cycle-bar">
      <div>
        <span class="cycle-label" id="cycle-label"></span>
        <span class="badge-archive" id="badge-archive" style="display:none">ARCHIVE</span>
      </div>
      <div class="btns">
        <button class="btn-sm" onclick="showHistory()">Historique</button>
        <button class="btn-sm btn-accent" id="btn-new-cycle" onclick="prepareNewCycle()">+ Cycle</button>
      </div>
    </div>
    <div class="phase-row">
      <div class="phase-title" id="phase-title"></div>
      <div class="rpe-pill" id="rpe-pill"></div>
    </div>
    <div class="week-tabs" id="week-tabs"></div>
    <div class="day-tabs" id="day-tabs"></div>
    <div class="progress-bar-wrap">
      <div class="progress-info"><span id="day-name"></span><span id="progress-count"></span></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
  </div>
  <div class="exercises" id="exercises"></div>
</div>

<!-- ═══ HISTORY VIEW ═══ -->
<div class="view" id="v-history">
  <div class="view-header">
    <div class="view-title">Historique</div>
    <button class="btn-sm" onclick="showTrain()">Retour</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- ═══ NEW CYCLE VIEW ═══ -->
<div class="view" id="v-newcycle">
  <div style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--d);text-transform:uppercase;margin-bottom:8px;">Nouveau cycle</div>
  <div class="view-title" id="nc-title"></div>
  <div id="nc-summary"></div>
  <div id="nc-estimates"></div>
  <div id="nc-buttons"></div>
</div>

<!-- ═══ TIMER BAR ═══ -->
<div class="timer-bar" id="timer-bar">
  <div class="timer-presets" id="timer-presets">
    <div class="label">REPOS</div>
    <button class="timer-preset-btn" onclick="startTimer(120)">2'</button>
    <button class="timer-preset-btn" onclick="startTimer(180)">3'</button>
    <button class="timer-preset-btn" onclick="startTimer(240)">4'</button>
    <button class="timer-preset-btn" onclick="startTimer(300)">5'</button>
  </div>
  <div class="timer-running" id="timer-running" style="display:none">
    <div>
      <div class="timer-sub">Repos</div>
      <div><span class="timer-display" id="timer-display">0:00</span><span class="timer-target" id="timer-target-display"></span></div>
      <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
    </div>
    <button class="btn-stop" onclick="stopTimer()">Stop</button>
  </div>
</div>

<script>
// ═══ PROGRAM DATA ═══
var WEEKS=[
  {num:1,phase:"Accumulation",rpe:"7",ts:5,bs:3,br:6,secS:4,secR:6,secRPE:"7",color:"#2ec4b6"},
  {num:2,phase:"Accumulation",rpe:"7.5",ts:5,bs:4,br:5,secS:4,secR:5,secRPE:"7.5",color:"#2ec4b6"},
  {num:3,phase:"Accumulation",rpe:"8",ts:4,bs:4,br:5,secS:3,secR:5,secRPE:"8",color:"#2ec4b6"},
  {num:4,phase:"Intensification",rpe:"8.5",ts:3,bs:3,br:4,secS:3,secR:4,secRPE:"8.5",color:"#4ea8de"},
  {num:5,phase:"Intensification",rpe:"9",ts:2,bs:2,br:3,secS:2,secR:3,secRPE:"8.5",color:"#4ea8de"},
  {num:6,phase:"Deload",rpe:"6",ts:5,bs:2,br:5,secS:2,secR:5,secRPE:"6",color:"#b388ff"},
  {num:7,phase:"Peak / Test",rpe:"10",ts:1,bs:0,br:0,secS:0,secR:0,secRPE:"-",color:"#e63946"}
];
var LIFTS=["Squat","Bench Press","Soulevé de Terre"];
var LIFT_MAP={
  "Squat":{main:[0,0],sec:[2,1]},
  "Bench Press":{main:[1,0],sec:[0,1]},
  "Soulevé de Terre":{main:[2,0],sec:[1,1]}
};

function buildDays(w){
  var isPeak=w.num===7,isDl=w.num===6,isInt=w.num>=4&&w.num<=5;
  var mainL=isPeak?"Montée → 1RM":"Top set x"+w.ts+" @ RPE "+w.rpe;
  function bo(dl){
    if(isPeak) return null;
    var s=dl?Math.max(w.bs-1,2):w.bs;
    if(isDl) return s+"x"+w.br+" @ RPE 6";
    return s+"x"+w.br+" @ -"+(isInt?"10%":"10-12%");
  }
  var secL=isPeak?null:isDl?w.secS+"x"+w.secR+" @ RPE 6":w.secS+"x"+w.secR+" @ RPE "+w.secRPE;
  function a(ac,it,dl){return isPeak?null:isDl?dl:isInt?it:ac;}
  return [
    {name:"Jour 1 — Squat + Bench",short:"J1",tag:"Squat",exercises:[
      {name:"Squat",type:"main",sets:mainL,backoff:bo(false),track:true},
      {name:"Bench Press",type:"sec",sets:secL,track:true},
      {name:"Leg Extension",type:"hyp",sets:a("3x12-15","2x12-15","2x15")},
      {name:"Leg Curl",type:"hyp",sets:a("3x12-15","2x12-15","2x15")},
      {name:"Mollets",type:"hyp",sets:a("4x12-15","3x12-15","2x15")}
    ].filter(function(e){return e.sets})},
    {name:"Jour 2 — Bench + Deadlift",short:"J2",tag:"Bench",exercises:[
      {name:"Bench Press",type:"main",sets:mainL,backoff:bo(false),track:true},
      {name:"Soulevé de Terre",type:"sec",sets:secL,track:true},
      {name:"Dév. Haltères Incliné",type:"hyp",sets:a("3x10-12","2x10-12","2x12")},
      {name:"Élévations Latérales",type:"hyp",sets:a("3x15-20","2x15","2x15")},
      {name:"Triceps Poulie",type:"hyp",sets:a("3x12-15","2x12-15","2x15")}
    ].filter(function(e){return e.sets})},
    {name:"Jour 3 — Deadlift + Squat",short:"J3",tag:"Deadlift",exercises:[
      {name:"Soulevé de Terre",type:"main",sets:mainL,backoff:bo(true),track:true},
      {name:"Squat",type:"sec",sets:secL,track:true},
      {name:"Tirage Vertical",type:"hyp",sets:a("3x10-12","2x10-12","2x12")},
      {name:"Bûcheron",type:"hyp",sets:a("3x10-12","2x10-12","2x12")},
      {name:"Curl Barre",type:"hyp",sets:a("3x10-12","2x10-12","2x12")}
    ].filter(function(e){return e.sets})}
  ];
}

function round25(v){return Math.round(v/2.5)*2.5;}
function isLower(n){return n==="Squat"||n==="Soulevé de Terre";}

function estimateWeights(prev){
  var est={};
  LIFTS.forEach(function(lift){
    var m=LIFT_MAP[lift],rmK="6-"+m.main[0]+"-"+m.main[1];
    var rm=parseFloat(prev[rmK]),s1m=parseFloat(prev["0-"+m.main[0]+"-"+m.main[1]]);
    var s1s=parseFloat(prev["0-"+m.sec[0]+"-"+m.sec[1]]);
    var bump=isLower(lift)?5:2.5;
    var newM,newS;
    if(rm>0){newM=round25(rm*.75);newS=round25(rm*.70);}
    else if(s1m>0){newM=round25(s1m+bump);newS=s1s>0?round25(s1s+bump):null;}
    else return;
    var mP=[1,1.03,1.07,1.12,1.18,.85,null],sP=[1,1.03,1.07,1.12,1.15,.85,null];
    for(var i=0;i<7;i++){
      if(i===6)continue;
      if(newM&&mP[i])est[i+"-"+m.main[0]+"-"+m.main[1]]=String(round25(newM*mP[i]));
      if(newS&&sP[i])est[i+"-"+m.sec[0]+"-"+m.sec[1]]=String(round25(newS*sP[i]));
    }
  });
  return est;
}

function get1RMs(cyc){
  var r={};
  LIFTS.forEach(function(l){var m=LIFT_MAP[l],k="6-"+m.main[0]+"-"+m.main[1],v=parseFloat(cyc.weights[k]);if(v>0)r[l]=v;});
  return r;
}

// ═══ STATE ═══
var state={cycles:[{weights:{},done:{},week:0,day:0,started:Date.now()}],ci:0};
var timerInterval=null,timerSec=0,timerTarget=180,timerOn=false,audioCtx=null;

function loadState(){
  try{var d=localStorage.getItem("pb-v2");if(d){var p=JSON.parse(d);if(p.cycles&&p.cycles.length)state=p;}}catch(e){}
}
function saveState(){try{localStorage.setItem("pb-v2",JSON.stringify(state));}catch(e){}}

function cyc(){return state.cycles[state.ci];}

// ═══ VIEWS ═══
function showView(id){
  document.querySelectorAll(".view").forEach(function(v){v.classList.remove("active");});
  document.getElementById(id).classList.add("active");
  document.getElementById("timer-bar").style.display=id==="v-train"?"block":"none";
}
function showTrain(){showView("v-train");render();}
function showHistory(){showView("v-history");renderHistory();}

// ═══ RENDER ═══
function render(){
  var c=cyc(),w=WEEKS[c.week],days=buildDays(w),d=days[c.day];
  var isCurrent=state.ci===state.cycles.length-1;

  // Cycle bar
  document.getElementById("cycle-label").textContent="Cycle "+(state.ci+1);
  document.getElementById("badge-archive").style.display=isCurrent?"none":"inline";
  document.getElementById("btn-new-cycle").style.display=isCurrent?"inline-block":"none";

  // Phase
  document.getElementById("phase-title").innerHTML="S"+w.num+' <span style="color:'+w.color+'">'+w.phase+"</span>";
  var pill=document.getElementById("rpe-pill");
  pill.textContent="RPE "+w.rpe;
  pill.style.background=w.color+"22";pill.style.color=w.color;

  // Week tabs
  var wt="";
  WEEKS.forEach(function(wk,i){wt+='<button class="week-tab'+(i===c.week?" active":"")+'" onclick="setWeek('+i+')">S'+wk.num+"</button>";});
  document.getElementById("week-tabs").innerHTML=wt;

  // Day tabs
  var dt="";
  days.forEach(function(dy,i){dt+='<button class="day-tab'+(i===c.day?" active":"")+'" onclick="setDay('+i+')"><div class="label">'+dy.short+'</div><div class="sub">'+dy.tag+"</div></button>";});
  document.getElementById("day-tabs").innerHTML=dt;

  // Progress
  var doneN=0;d.exercises.forEach(function(_,i){if(c.done[c.week+"-"+c.day+"-"+i])doneN++;});
  document.getElementById("day-name").textContent=d.name;
  document.getElementById("progress-count").textContent=doneN+"/"+d.exercises.length;
  document.getElementById("progress-fill").style.width=(doneN/d.exercises.length*100)+"%";

  // Exercises
  var typeLabels={main:"PRINCIPAL",sec:"SECONDAIRE",hyp:"HYPERTROPHIE"};
  var html="";
  d.exercises.forEach(function(ex,i){
    var k=c.week+"-"+c.day+"-"+i;
    var isDone=!!c.done[k];
    var weight=c.weights[k]||"";
    var prev=getPrevHint(c.week,c.day,i);

    html+='<div class="ex-card'+(isDone?" done":"")+'">';
    html+='<div class="ex-top"><div class="ex-info">';
    html+='<div class="ex-name-row"><span class="ex-name">'+ex.name+'</span><span class="ex-type '+ex.type+'">'+typeLabels[ex.type]+"</span></div>";
    html+='<div class="ex-sets">'+ex.sets+"</div>";
    if(ex.backoff)html+='<div class="ex-backoff">'+ex.backoff+"</div>";
    html+="</div>";
    html+='<button class="check-btn'+(isDone?" checked":"")+'" onclick="toggleDone('+i+')">'+(isDone?"✓":"")+"</button>";
    html+="</div>";

    if(ex.track){
      html+='<div class="weight-row"><div class="weight-label">Charge :</div>';
      html+='<div class="weight-wrap"><input type="number" inputmode="decimal" class="weight-input" placeholder="—" value="'+weight+'" onchange="setWeight('+i+',this.value)" onblur="setWeight('+i+',this.value)"><span class="weight-unit">kg</span></div></div>';
      if(prev&&!weight)html+='<div class="prev-hint">↳ '+prev+"</div>";
    }
    html+="</div>";
  });
  document.getElementById("exercises").innerHTML=html;
}

function getPrevHint(wi,di,ei){
  if(state.ci===0)return null;
  var prev=state.cycles[state.ci-1];
  if(!prev)return null;
  var v=prev.weights[wi+"-"+di+"-"+ei];
  return v?v+" kg (cycle préc.)":null;
}

function setWeek(i){cyc().week=i;cyc().day=0;saveState();render();}
function setDay(i){cyc().day=i;saveState();render();}
function toggleDone(ei){var k=cyc().week+"-"+cyc().day+"-"+ei;cyc().done[k]=!cyc().done[k];saveState();render();}
function setWeight(ei,val){var k=cyc().week+"-"+cyc().day+"-"+ei;cyc().weights[k]=val;saveState();}

// ═══ TIMER ═══
function fmtTime(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

function startTimer(t){
  timerTarget=t;timerSec=0;timerOn=true;
  document.getElementById("timer-presets").style.display="none";
  document.getElementById("timer-running").style.display="flex";
  updateTimerDisplay();
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    timerSec++;
    updateTimerDisplay();
    if(timerSec>=timerTarget){
      clearInterval(timerInterval);timerOn=false;
      try{
        if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        [0,.18,.36].forEach(function(d){
          var o=audioCtx.createOscillator(),g=audioCtx.createGain();
          o.connect(g);g.connect(audioCtx.destination);
          o.frequency.value=880;g.gain.value=.3;
          o.start(audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d+.1);
        });
      }catch(e){}
      if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
    }
  },1000);
}

function stopTimer(){
  clearInterval(timerInterval);timerOn=false;timerSec=0;
  document.getElementById("timer-presets").style.display="flex";
  document.getElementById("timer-running").style.display="none";
}

function updateTimerDisplay(){
  var done=timerSec>=timerTarget;
  document.getElementById("timer-display").textContent=fmtTime(timerSec);
  document.getElementById("timer-display").style.color=done?"var(--a)":"var(--t)";
  document.getElementById("timer-target-display").textContent="/ "+fmtTime(timerTarget);
  var pct=Math.min(timerSec/timerTarget*100,100);
  var fill=document.getElementById("timer-fill");
  fill.style.width=pct+"%";
  fill.style.background=done?"var(--a)":"var(--g)";
}

// ═══ HISTORY ═══
function renderHistory(){
  var html="";
  state.cycles.forEach(function(c,idx){
    var rms=get1RMs(c);
    var isCur=idx===state.ci;
    var sd=c.started?new Date(c.started).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"}):"—";
    var ed=c.ended?new Date(c.ended).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"}):null;
    var dn=Object.values(c.done).filter(Boolean).length;

    html+='<div class="hist-card'+(isCur?" current":"")+'">';
    html+='<div class="hist-header"><div><span class="hist-title">Cycle '+(idx+1)+"</span>";
    if(isCur)html+='<span class="badge-en-cours">EN COURS</span>';
    html+='</div><div class="hist-date">'+sd+(ed?" → "+ed:"")+"</div></div>";
    html+='<div class="hist-rms">';
    LIFTS.forEach(function(l){
      var short=l==="Soulevé de Terre"?"Deadlift":l;
      html+='<div class="hist-rm"><div class="lift">'+short+'</div><div class="val" style="color:'+(rms[l]?"var(--a)":"var(--d)")+'">'+(rms[l]||"—")+"</div></div>";
    });
    html+="</div>";
    html+='<div class="hist-meta">'+dn+" exercices complétés</div>";
    if(!isCur)html+='<button class="btn-consult" onclick="consultCycle('+idx+')">Consulter</button>';
    html+="</div>";
  });
  document.getElementById("history-list").innerHTML=html;
}

function consultCycle(idx){state.ci=idx;saveState();showTrain();}

// ═══ NEW CYCLE ═══
var pendingEstimates=null;

function prepareNewCycle(){
  var c=cyc();
  pendingEstimates=estimateWeights(c.weights);
  var rms=get1RMs(c);
  var hasEst=Object.keys(pendingEstimates).length>0;
  var hasRMs=Object.keys(rms).length>0;

  document.getElementById("nc-title").innerHTML='Lancer le <span style="color:var(--a)">Cycle '+(state.cycles.length+1)+"</span> ?";

  // Summary
  var sh='<div class="summary-card"><div class="summary-label">Résumé Cycle '+(state.ci+1)+"</div>";
  if(hasRMs){
    LIFTS.forEach(function(l){
      sh+='<div class="summary-row"><span class="summary-lift">'+l+'</span><span class="summary-val" style="color:'+(rms[l]?"var(--a)":"var(--d)")+'">'+(rms[l]?rms[l]+" kg":"Non testé")+"</span></div>";
    });
  }else{
    sh+='<div style="font-size:13px;color:var(--d);">Aucun 1RM enregistré en S7. Estimations basées sur tes charges S1 + 2.5/5 kg.</div>';
  }
  sh+="</div>";
  document.getElementById("nc-summary").innerHTML=sh;

  // Estimates
  var eh="";
  if(hasEst){
    eh+='<div class="summary-card"><div class="summary-label" style="color:var(--g)">Charges estimées S1 (nouveau cycle)</div>';
    LIFTS.forEach(function(l){
      var m=LIFT_MAP[l],mk="0-"+m.main[0]+"-"+m.main[1],sk="0-"+m.sec[0]+"-"+m.sec[1];
      var mw=pendingEstimates[mk],sw=pendingEstimates[sk];
      eh+='<div class="est-row"><div class="est-lift">'+l+"</div>";
      eh+='<div class="est-detail"><span>Principal: <span style="color:var(--a)">'+(mw||"—")+' kg</span></span>';
      eh+='<span>Secondaire: <span style="color:var(--bl)">'+(sw||"—")+" kg</span></span></div></div>";
    });
    eh+='<div class="est-note">Les semaines suivantes sont aussi pré-remplies avec une progression estimée. Tu peux modifier manuellement.</div>';
    eh+="</div>";
  }
  document.getElementById("nc-estimates").innerHTML=eh;

  // Buttons
  var bh="";
  if(hasEst)bh+='<button class="btn-primary" onclick="confirmNewCycle(true)">Lancer avec charges estimées</button>';
  bh+='<button class="btn-secondary" onclick="confirmNewCycle(false)">Lancer vierge</button>';
  bh+='<button class="btn-ghost" onclick="showTrain()">Annuler</button>';
  document.getElementById("nc-buttons").innerHTML=bh;

  showView("v-newcycle");
}

function confirmNewCycle(useEst){
  var nc={weights:useEst&&pendingEstimates?Object.assign({},pendingEstimates):{},done:{},week:0,day:0,started:Date.now()};
  state.cycles[state.ci].ended=Date.now();
  state.cycles.push(nc);
  state.ci=state.cycles.length-1;
  pendingEstimates=null;
  saveState();
  showTrain();
}

// ═══ INIT ═══
loadState();
render();

// Service Worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(function(){});
}
</script>
